services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npx nuxt dev --host 0.0.0.0
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=mysql://mootasks:password@db:3306/mootasks
      - DB_HOST=db
      - DB_PORT=3306
      - DB_SSL=
      - DB_USER=mootasks
      - DB_PASSWORD=password
      - DB_NAME=mootasks
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    command: --authentication-policy=mysql_native_password --host-cache-size=0
    ports:
      - "${DB_LOCAL_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_USER=mootasks
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=mootasks
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/mysql

