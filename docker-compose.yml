services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: sh -c "npm run db:migrate && npx nuxt dev --host 0.0.0.0"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - HOST=0.0.0.0
      - DB_HOST=db
      - DB_PORT=3306
      - DB_SSL=
      - DB_USER=mootasks
      - DB_PASSWORD=password
      - DB_NAME=mootasks
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: db
    command: --authentication-policy=mysql_native_password --host-cache-size=0
    ports:
      - "${DB_LOCAL_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_USER=mootasks
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=mootasks
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - moo-network

networks:
  moo-network:
    driver: bridge

volumes:
  db-data:
